server {
    listen 80;
    server_name _;

    root /var/www/lmsgrave/client/dist;
    index index.html;

    client_max_body_size 10M;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the Node server container
    location /api/ {
        # 'server' resolves to the container name defined in docker-compose.yml
        proxy_pass http://server:5000;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;
    }

    # Serve uploads volume
    location /uploads/ {
        alias /var/www/lmsgrave/server/uploads/;
        expires 30d;
        add_header X-Served-By "nginx-static-docker";
    }
}
