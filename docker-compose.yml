version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: lms-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  server:
    build: 
      context: ./server
      dockerfile: Dockerfile
    container_name: lms-server
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/lms
      - JWT_SECRET=secret_key_change_this_later
      - ALLOWED_ORIGIN=http://localhost
    depends_on:
      - mongodb
    restart: unless-stopped
    volumes:
      - server_uploads:/usr/src/app/uploads

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: lms-client
    ports:
      - "80:80"
    depends_on:
      - server
    restart: unless-stopped
    volumes:
      - server_uploads:/var/www/lmsgrave/server/uploads:ro

volumes:
  mongodb_data:
  server_uploads:
